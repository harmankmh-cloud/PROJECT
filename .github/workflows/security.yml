name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 0'

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      
      - name: Check for security vulnerabilities
        run: |
          npm audit --audit-level=moderate 2>/dev/null || echo 'Audit completed with warnings'
          cd reviewflow && npm audit --audit-level=moderate 2>/dev/null || echo 'reviewflow audit completed'
          cd ../voiceagent && npm audit --audit-level=moderate 2>/dev/null || echo 'voiceagent audit completed'
          cd ../servelocal && npm audit --audit-level=moderate 2>/dev/null || echo 'servelocal audit completed'
          cd ../route-max && npm audit --audit-level=moderate 2>/dev/null || echo 'route-max audit completed'
        continue-on-error: true
