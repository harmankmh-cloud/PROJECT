<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Route Max">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06101a"/>
      <stop offset="100%" stop-color="#03080f"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(0,212,255,0.35)" stroke-width="1.5"/>
  <!-- corner accents -->
  <path d="M6 18 L6 6 L18 6" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M46 58 L58 58 L58 46" fill="none" stroke="#ff8c00" stroke-width="1.5" stroke-linecap="round"/>
  <!-- route line -->
  <path d="M14 46 C20 30 44 34 50 18" fill="none" stroke="url(#route)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- dots -->
  <circle cx="14" cy="46" r="4.5" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="50" cy="18" r="4.5" fill="#ff8c00" filter="url(#glow)"/>
</svg>
